{% extends "base.html" %}
{% block title %}Login — Ruff Life Retreat{% endblock %}
{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-5">
        <div class="card shadow">
            <div class="card-body p-4">

                <div class="text-center mb-4">
                    <div style="font-size:2.5rem;">🐾</div>
                    <h3 class="fw-bold mt-2">Welcome Back</h3>
                    <p class="text-muted small">Sign in to your Ruff Life Retreat account</p>
                </div>

                <form method="POST">
                    <div class="mb-3">
                        <label for="email" class="form-label fw-bold">Email Address</label>
                        <input type="email" class="form-control" id="email" name="email"
                               placeholder="you@example.com" required autofocus>
                    </div>
                    <div class="mb-1">
                        <label for="password" class="form-label fw-bold">Password</label>
                        <input type="password" class="form-control" id="password" name="password"
                               placeholder="Your password" required>
                    </div>
                    <div class="text-end mb-4">
                        <a href="{{ url_for('auth.forgot_password') }}"
                           class="text-decoration-none text-muted small">
                            Forgot your password?
                        </a>
                    </div>
                    <button type="submit" class="btn btn-warning text-dark fw-bold w-100 mb-3">
                        <i class="fas fa-sign-in-alt me-2"></i>Login
                    </button>
                </form>

                <p class="text-center mb-0 small text-muted">
                    Don't have an account?
                    <a href="{{ url_for('auth.register') }}" class="text-decoration-none fw-bold">Register</a>
                </p>

            </div>
        </div>
    </div>
</div>
{% endblock %}
