{% extends "base.html" %}
{% block title %}Reset Password — Ruff Life Retreat{% endblock %}
{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-5">
        <div class="card shadow-sm border-0">
            <div class="card-header text-white text-center py-3" style="background:#1B2A4A;">
                <i class="fas fa-key fa-2x mb-2 d-block" style="color:#B07A8E;"></i>
                <h5 class="mb-0 fw-bold">Reset Your Password</h5>
            </div>
            <div class="card-body p-4">
                <p class="text-muted mb-4 text-center" style="font-size:0.92rem;">
                    Choose a new password for your account. Must be at least 8 characters.
                </p>
                <form method="POST">
                    <div class="mb-3">
                        <label for="password" class="form-label fw-bold">New Password</label>
                        <input type="password" class="form-control form-control-lg"
                               id="password" name="password"
                               minlength="8" required autofocus
                               placeholder="At least 8 characters">
                    </div>
                    <div class="mb-4">
                        <label for="password2" class="form-label fw-bold">Confirm New Password</label>
                        <input type="password" class="form-control form-control-lg"
                               id="password2" name="password2"
                               minlength="8" required
                               placeholder="Repeat your new password">
                        <div id="matchFeedback" class="form-text"></div>
                    </div>
                    <button type="submit" class="btn btn-primary w-100 py-2 fw-bold" id="submitBtn">
                        <i class="fas fa-check me-2"></i>Set New Password
                    </button>
                </form>
            </div>
            <div class="card-footer bg-white text-center py-3">
                <a href="{{ url_for('auth.login') }}" class="text-muted text-decoration-none" style="font-size:0.88rem;">
                    <i class="fas fa-arrow-left me-1"></i>Back to Login
                </a>
            </div>
        </div>
    </div>
</div>

<script>
const p1 = document.getElementById('password');
const p2 = document.getElementById('password2');
const fb = document.getElementById('matchFeedback');
const btn = document.getElementById('submitBtn');

function checkMatch() {
    if (!p2.value) { fb.textContent = ''; btn.disabled = false; return; }
    if (p1.value === p2.value) {
        fb.textContent = '✓ Passwords match';
        fb.style.color = '#198754';
        btn.disabled = false;
    } else {
        fb.textContent = '✗ Passwords do not match';
        fb.style.color = '#dc3545';
        btn.disabled = true;
    }
}
p1.addEventListener('input', checkMatch);
p2.addEventListener('input', checkMatch);
</script>
{% endblock %}
