{% extends "base.html" %}
{% block title %}Forgot Password — Ruff Life Retreat{% endblock %}
{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-5">
        <div class="card shadow-sm border-0">
            <div class="card-header text-white text-center py-3" style="background:#1B2A4A;">
                <i class="fas fa-lock fa-2x mb-2 d-block" style="color:#B07A8E;"></i>
                <h5 class="mb-0 fw-bold">Forgot Your Password?</h5>
            </div>
            <div class="card-body p-4">
                <p class="text-muted mb-4 text-center" style="font-size:0.92rem;">
                    Enter the phone number on your account and we'll send you a reset link via SMS.
                </p>
                <form method="POST">
                    <div class="mb-3">
                        <label for="phone" class="form-label fw-bold">Phone Number</label>
                        <input type="tel" class="form-control form-control-lg" id="phone" name="phone"
                               placeholder="(912) 555-1234" required autofocus>
                        <div class="form-text">Enter the number you registered with.</div>
                    </div>
                    <button type="submit" class="btn btn-primary w-100 py-2 fw-bold">
                        <i class="fas fa-sms me-2"></i>Send Reset Link
                    </button>
                </form>
            </div>
            <div class="card-footer bg-white text-center py-3">
                <a href="{{ url_for('auth.login') }}" class="text-muted text-decoration-none" style="font-size:0.88rem;">
                    <i class="fas fa-arrow-left me-1"></i>Back to Login
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
