{% extends "base.html" %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-lg-6">
            <div class="card shadow">
                <div class="card-header bg-warning text-dark">
                    <h3 class="mb-0 text-center">
                        <i class="fas fa-clipboard-list"></i> Join Daycare Waitlist
                    </h3>
                </div>
                <div class="card-body">
                    <p class="text-center text-muted mb-4">
                        Fill out your contact information and we'll redirect you to complete your registration!
                    </p>

                    <form method="POST" action="{{ url_for('public.daycare_waitlist') }}">
                        <!-- Honeypot field - hidden from humans, bots will fill it -->
                        <div style="position: absolute; left: -9999px;" aria-hidden="true">
                            <label for="website">Leave this field empty</label>
                            <input type="text" name="website" id="website" tabindex="-1" autocomplete="off">
                        </div>
                        
                        <!-- Timestamp for timing check -->
                        <input type="hidden" name="_timestamp" value="{{ form_timestamp }}">
                        
                        <!-- Owner Information -->
                        <h5 class="mb-3"><i class="fas fa-user"></i> Your Information</h5>
                        
                        <div class="mb-3">
                            <label for="first_name" class="form-label">First Name <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" id="first_name" name="first_name" required>
                        </div>

                        <div class="mb-3">
                            <label for="last_name" class="form-label">Last Name <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" id="last_name" name="last_name" required>
                        </div>

                        <div class="mb-3">
                            <label for="email" class="form-label">Email Address <span class="text-danger">*</span></label>
                            <input type="email" class="form-control" id="email" name="email" required>
                        </div>

                        <div class="mb-3">
                            <label for="phone" class="form-label">Phone Number <span class="text-danger">*</span></label>
                            <input type="tel" class="form-control" id="phone" name="phone" 
                                   placeholder="(555) 123-4567" required>
                        </div>

                        <hr class="my-4">

                    <!-- Days of Interest -->
                    <h5 class="mb-3"><i class="fas fa-calendar-alt"></i> Days of Interest</h5>
                    <p class="text-muted small">Select which day(s) you're interested in for daycare</p>
                    <div class="d-flex gap-4 flex-wrap mb-3">
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" name="monday" id="monday" value="1">
                            <label class="form-check-label" for="monday"><strong>Monday</strong></label>
                        </div>
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" name="tuesday" id="tuesday" value="1">
                            <label class="form-check-label" for="tuesday"><strong>Tuesday</strong></label>
                        </div>
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" name="wednesday" id="wednesday" value="1">
                            <label class="form-check-label" for="wednesday"><strong>Wednesday</strong></label>
                        </div>
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" name="thursday" id="thursday" value="1">
                            <label class="form-check-label" for="thursday"><strong>Thursday</strong></label>
                        </div>
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" name="friday" id="friday" value="1">
                            <label class="form-check-label" for="friday"><strong>Friday</strong></label>
                        </div>
                    </div>
                            <hr class="my-4">

                    <div class="d-flex justify-content-between align-items-center">
                        <a href="{{ url_for('public.daycare') }}" class="btn btn-outline-secondary">
                            <i class="fas fa-arrow-left"></i> Back to Daycare Info
                        </a>
                        <button type="submit" class="btn btn-warning text-dark fw-bold px-4">
                            <i class="fas fa-clipboard-check"></i> Join Waitlist
                        </button>
                    </div>
                </div>
            </form>
                </div>
            </div>
        </div>
    </div>
</div>

<style>
.card {
    border: none;
    border-radius: 15px;
}

.card-header {
    border-radius: 15px 15px 0 0 !important;
}

.form-label {
    font-weight: 500;
}

.form-check {
    padding: 10px;
    margin-bottom: 10px;
    background: #f8f9fa;
    border-radius: 5px;
}

.form-check-input:checked {
    background-color: #FFC107;
    border-color: #FFC107;
}
</style>
{% endblock %}
