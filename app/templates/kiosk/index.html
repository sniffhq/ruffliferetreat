<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ruff Life Retreat — Daycare Kiosk</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 60%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: Arial, sans-serif;
        }
        .kiosk-card {
            background: white;
            border-radius: 24px;
            padding: 44px 40px;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.4);
        }
        .kiosk-input {
            font-size: 1.15rem;
            padding: 14px 18px;
            border-radius: 12px;
            border: 2px solid #dee2e6;
            transition: border-color 0.2s;
        }
        .kiosk-input:focus {
            border-color: #FFC107;
            box-shadow: 0 0 0 3px rgba(255,193,7,0.2);
            outline: none;
        }
        .btn-lookup {
            background: #FFC107;
            color: #1a1a2e;
            font-size: 1rem;
            font-weight: 800;
            padding: 14px 20px;
            border-radius: 0 12px 12px 0;
            border: none;
            white-space: nowrap;
            transition: background 0.2s;
        }
        .btn-lookup:hover { background: #e0a800; }
        .btn-lookup:disabled { opacity: 0.6; cursor: not-allowed; }
        .pet-btn {
            width: 100%;
            padding: 18px 24px;
            border-radius: 14px;
            border: 3px solid #dee2e6;
            background: white;
            font-size: 1.2rem;
            font-weight: 700;
            color: #1a1a2e;
            cursor: pointer;
            text-align: left;
            transition: all 0.15s;
            position: relative;
        }
        .pet-btn:hover {
            border-color: #FFC107;
            background: #fffbf0;
        }
        .pet-btn.selected {
            border-color: #198754;
            background: #d1e7dd;
            color: #0a3622;
        }
        .pet-btn.selected::after {
            content: '✓';
            position: absolute;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 1.3rem;
            color: #198754;
        }
        .pet-count-badge {
            display: inline-block;
            background: #198754;
            color: white;
            border-radius: 50px;
            padding: 2px 10px;
            font-size: 0.85rem;
            font-weight: 700;
            margin-left: 8px;
        }
        .btn-checkin {
            background: #198754;
            color: white;
            font-size: 1.1rem;
            font-weight: 800;
            padding: 16px;
            border-radius: 12px;
            border: none;
            width: 100%;
            transition: background 0.2s;
        }
        .btn-checkin:hover { background: #146c43; color: white; }
        .btn-checkout {
            background: #1a1a2e;
            color: #FFC107;
            font-size: 1.1rem;
            font-weight: 800;
            padding: 16px;
            border-radius: 12px;
            border: none;
            width: 100%;
            transition: background 0.2s;
        }
        .btn-checkout:hover { background: #0f3460; color: #FFC107; }
        .alert { border-radius: 12px; }
        input[type=tel] { -webkit-appearance: none; }
        .divider {
            border: none;
            border-top: 2px dashed #dee2e6;
            margin: 24px 0;
        }
        /* Phone input + button as one unit */
        .phone-group {
            display: flex;
            border-radius: 12px;
            overflow: hidden;
            border: 2px solid #dee2e6;
            transition: border-color 0.2s;
        }
        .phone-group:focus-within {
            border-color: #FFC107;
            box-shadow: 0 0 0 3px rgba(255,193,7,0.2);
        }
        .phone-group .kiosk-input {
            border: none !important;
            border-radius: 0;
            box-shadow: none !important;
            flex: 1;
        }
        .phone-group .btn-lookup {
            border-radius: 0;
        }
    </style>
</head>
<body>

<div class="kiosk-card">

    <!-- Logo -->
    <div class="text-center mb-4">
        <div style="font-size:2.6rem; margin-bottom:6px;">🐾</div>
        <h2 style="font-weight:800; color:#1a1a2e; margin-bottom:4px;">Ruff Life Retreat</h2>
        <div style="color:#888; font-size:0.9rem;">Daycare Check-In / Check-Out</div>
    </div>

    <!-- Flash messages -->
    {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
        {% for category, message in messages %}
        <div class="alert alert-{{ 'success' if category == 'success' else 'danger' if category == 'danger' else 'warning' }} mb-4">
            {{ message }}
        </div>
        {% endfor %}
    {% endif %}
    {% endwith %}

    <!-- Form -->
    <form method="POST" action="{{ url_for('kiosk.index') }}" id="kiosk-form"
          onsubmit="return validateForm()">

        <!-- Pet names (comma-separated) — built by JS as pets are toggled -->
        <input type="hidden" name="pet_names" id="selected-pet-names" value="">

        <!-- ── Step 1: Phone number ── -->
        <div id="step-phone" class="mb-3">
            <label class="form-label fw-bold" style="font-size:1rem;">
                <i class="fas fa-phone me-2 text-warning"></i>Phone Number
            </label>
            <div class="phone-group">
                <input type="tel" name="phone" id="phone" class="kiosk-input"
                       placeholder="(912) 555-1234"
                       autocomplete="off" autocorrect="off" spellcheck="false"
                       inputmode="numeric" autofocus>
                <button type="button" id="lookup-btn" class="btn-lookup"
                        onclick="lookupPets()">
                    <i class="fas fa-search me-1"></i> Find Pets
                </button>
            </div>
            <div id="phone-msg" class="mt-2 small" style="display:none;"></div>
        </div>

        <!-- ── Step 2: Pet selection (shown after lookup) ── -->
        <div id="step-pets" style="display:none;">
            <hr class="divider">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <div id="owner-greeting"
                     style="font-size:1.15rem; font-weight:800; color:#1a1a2e;"></div>
                <button type="button" class="btn btn-sm btn-outline-secondary"
                        onclick="resetPhone()">
                    <i class="fas fa-times me-1"></i>Change
                </button>
            </div>
            <div class="d-flex justify-content-between align-items-center mb-2">
                <div class="fw-bold text-muted"
                     style="font-size:0.8rem; text-transform:uppercase; letter-spacing:.05em;">
                    Select pet(s):
                </div>
                <div id="pet-count" style="display:none;">
                    <span class="pet-count-badge" id="pet-count-label"></span>
                </div>
            </div>
            <div id="pet-buttons" class="d-grid gap-3"></div>
        </div>

        <!-- ── Step 3: Action buttons (shown after ≥1 pet selected) ── -->
        <div id="step-actions" style="display:none;">
            <hr class="divider">
            <div class="d-grid gap-3">
                <button type="submit" name="action" value="checkin" class="btn-checkin" id="btn-checkin">
                    <i class="fas fa-sign-in-alt me-2"></i><span id="checkin-label">Check In</span>
                </button>
                <button type="submit" name="action" value="checkout" class="btn-checkout" id="btn-checkout">
                    <i class="fas fa-sign-out-alt me-2"></i><span id="checkout-label">Check Out</span>
                </button>
            </div>
        </div>

    </form>

    <div style="text-align:center; margin-top:28px; color:#ccc; font-size:0.78rem;">
        Need help? Ask a staff member.
    </div>

</div>

<script>
    // ── Auto-clear on success ──────────────────────────────────────────────
    {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
    {% for category, message in messages %}
    {% if category == 'success' %}
    resetPhone();
    {% endif %}
    {% endfor %}
    {% endif %}
    {% endwith %}

    // ── State ─────────────────────────────────────────────────────────────
    let selectedPets = new Set();

    // ── Auto-trigger lookup after 10 digits ───────────────────────────────
    let lookupTimeout = null;
    document.getElementById('phone').addEventListener('input', function () {
        const digits = this.value.replace(/\D/g, '');
        clearTimeout(lookupTimeout);
        if (digits.length >= 10) {
            lookupTimeout = setTimeout(lookupPets, 600);
        } else {
            hidePets();
        }
    });

    // ── Lookup ────────────────────────────────────────────────────────────
    function lookupPets() {
        const phone = document.getElementById('phone').value.trim();
        if (!phone) return;

        const btn = document.getElementById('lookup-btn');
        const msg = document.getElementById('phone-msg');

        btn.disabled = true;
        btn.innerHTML = '<i class="fas fa-spinner fa-spin me-1"></i> Looking up…';

        fetch('/kiosk/lookup-pets?phone=' + encodeURIComponent(phone))
            .then(r => r.json())
            .then(data => {
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-search me-1"></i> Find Pets';

                if (data.error) {
                    msg.className = 'mt-2 small text-danger';
                    msg.innerHTML = '<i class="fas fa-exclamation-circle me-1"></i>' + data.error;
                    msg.style.display = '';
                    hidePets();
                    return;
                }

                msg.style.display = 'none';
                selectedPets.clear();

                document.getElementById('owner-greeting').textContent =
                    'Hi, ' + data.owner + '! 👋';

                const container = document.getElementById('pet-buttons');
                container.innerHTML = '';
                data.pets.forEach(function (pet) {
                    const el = document.createElement('button');
                    el.type = 'button';
                    el.className = 'pet-btn';
                    el.dataset.petName = pet.name;
                    el.innerHTML = '<i class="fas fa-paw me-2 text-warning"></i>' + pet.name;
                    el.addEventListener('click', function () { togglePet(pet.name, el); });
                    container.appendChild(el);
                });

                document.getElementById('step-pets').style.display = '';

                // Auto-select if only one pet
                if (data.pets.length === 1) {
                    container.querySelector('.pet-btn').click();
                }
            })
            .catch(function () {
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-search me-1"></i> Find Pets';
                msg.className = 'mt-2 small text-danger';
                msg.innerHTML = '<i class="fas fa-exclamation-circle me-1"></i>Connection error. Please try again.';
                msg.style.display = '';
            });
    }

    // ── Toggle pet selection ──────────────────────────────────────────────
    function togglePet(name, buttonEl) {
        if (selectedPets.has(name)) {
            selectedPets.delete(name);
            buttonEl.classList.remove('selected');
        } else {
            selectedPets.add(name);
            buttonEl.classList.add('selected');
        }
        updateSelectionUI();
    }

    function updateSelectionUI() {
        const count = selectedPets.size;

        // Hidden field
        document.getElementById('selected-pet-names').value = Array.from(selectedPets).join(',');

        // Counter badge
        const badge = document.getElementById('pet-count');
        const label = document.getElementById('pet-count-label');
        if (count > 0) {
            label.textContent = count + (count === 1 ? ' selected' : ' selected');
            badge.style.display = '';
        } else {
            badge.style.display = 'none';
        }

        // Action button labels
        const petWord = count === 1 ? '1 Pet' : count + ' Pets';
        document.getElementById('checkin-label').textContent  = count > 1 ? 'Check In '  + petWord : 'Check In';
        document.getElementById('checkout-label').textContent = count > 1 ? 'Check Out ' + petWord : 'Check Out';

        // Show / hide action buttons
        document.getElementById('step-actions').style.display = count > 0 ? '' : 'none';
    }

    // ── Reset / start over ────────────────────────────────────────────────
    function resetPhone() {
        document.getElementById('phone').value = '';
        document.getElementById('phone-msg').style.display = 'none';
        hidePets();
        document.getElementById('phone').focus();
    }

    function hidePets() {
        selectedPets.clear();
        document.getElementById('selected-pet-names').value = '';
        document.getElementById('step-pets').style.display = 'none';
        document.getElementById('step-actions').style.display = 'none';
        document.getElementById('pet-count').style.display = 'none';
    }

    // ── Guard on submit ───────────────────────────────────────────────────
    function validateForm() {
        if (selectedPets.size === 0) {
            alert('Please look up a phone number and select at least one pet.');
            return false;
        }
        return true;
    }
</script>

</body>
</html>
